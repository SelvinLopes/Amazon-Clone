<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1 class="header">Rock Paper Scissors</h1>
    <div class="choices">
        <div class="choice1" id="rock">
            <img src="./rock2.png" alt="hand-rock">
        </div>
        <div class="choice1" id="paper">
            <img src="./paper2.png" alt="hand-paper">
        </div>
        <div class="choice1" id="scissor">
            <img src="./scissor2.png" alt="hand-scissor">
        </div>
    </div>

    <div class="score-board">
        <div class="score-you">
            <p id="userscore">0</p>
            <p class="y2">You</p>
        </div>
        <div class="score-computer">
            <p id="compscore">0</p>
            <p class="y2">Computer</p>
        </div>
        <div class="score-draw">
            <p id="drawscore">0</p>
            <p class="y2">Draw</p>
        </div>

    </div>

    <div class="msg-container">
        <p id="msg-text">  Play your Move!!  </p>
    </div>
    <script src="./app.js"></script>
</body>
</html>
